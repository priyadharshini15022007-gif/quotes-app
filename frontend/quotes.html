<!DOCTYPE html>
<html>
<head>
    <title>Quotes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body id="body">

<div class="container">

    <h1 class="title">Insight of the Day ✨</h1>

    <div class="card-container">

        <div class="card daily" onclick="loadQuotes('daily')">
            <h3>Daily Quotes</h3>
        </div>

        <div class="card motivational" onclick="loadQuotes('motivational')">
            <h3>Motivational</h3>
        </div>

        <div class="card inspirational" onclick="loadQuotes('inspirational')">
            <h3>Inspirational</h3>
        </div>

        <div class="card life" onclick="loadQuotes('life')">
            <h3>Life Quotes</h3>
        </div>

    </div>

    <div class="quote-box">
        <p id="quote">Select a category 👆</p>
        <h4 id="date"></h4>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
